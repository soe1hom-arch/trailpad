name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
      - name: Run tests
        run: python -m unittest discover -s tests -v

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - label: linux-amd64
            os: ubuntu-latest
            artifact_name: trailpad-linux-amd64
          - label: linux-arm64
            os: ubuntu-24.04-arm
            artifact_name: trailpad-linux-arm64
          - label: windows-amd64
            os: windows-latest
            artifact_name: trailpad-windows-amd64.exe
          - label: macos-arm64
            os: macos-latest
            artifact_name: trailpad-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
      - name: Build binary
        shell: bash
        run: |
          pyinstaller --onefile --name trailpad main.py
          case "${{ matrix.label }}" in
            windows-amd64)
              mv dist/trailpad.exe "dist/${{ matrix.artifact_name }}"
              ;;
            *)
              chmod +x dist/trailpad
              mv dist/trailpad "dist/${{ matrix.artifact_name }}"
              ;;
          esac
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
